<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diemo – Rechtliches</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 20px rgba(0,0,0,.08);
      text-align: center;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .4rem; }
    .subtitle { color: #6e6e73; font-size: .95rem; margin-bottom: 2.5rem; }

    .doc-list {
      list-style: none;
      text-align: left;
    }

    .doc-list li {
      border-bottom: 1px solid #f0f0f0;
    }
    .doc-list li:last-child { border-bottom: none; }

    .doc-list a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem .5rem;
      color: #1d1d1f;
      text-decoration: none;
      transition: opacity .15s;
    }
    .doc-list a:hover { opacity: .65; }

    .doc-icon {
      width: 40px;
      height: 40px;
      background: #f5f5f7;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .doc-info { flex: 1; }
    .doc-title { font-weight: 600; font-size: .95rem; }
    .doc-lang { color: #6e6e73; font-size: .8rem; margin-top: .15rem; }

    .chevron { color: #c7c7cc; font-size: 1.1rem; }

    footer {
      margin-top: 1.5rem;
      color: #aeaeb2;
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="app_icon.png" class="app-icon">
    <h1>Diemo</h1>
    <p class="subtitle">Rechtliche Dokumente · Legal Documents</p>

    <ul class="doc-list">
      <li>
        <a href="datenschutz.html">
          <div class="doc-icon">🔒</div>
          <div class="doc-info">
            <div class="doc-title">Datenschutzerklärung</div>
            <div class="doc-lang">Deutsch</div>
          </div>
          <span class="chevron">›</span>
        </a>
      </li>
      <li>
        <a href="privacy.html">
          <div class="doc-icon">🔒</div>
          <div class="doc-info">
            <div class="doc-title">Privacy Policy</div>
            <div class="doc-lang">English</div>
          </div>
          <span class="chevron">›</span>
        </a>
      </li>
      <li>
        <a href="eula.html">
          <div class="doc-icon">📋</div>
          <div class="doc-info">
            <div class="doc-title">End User License Agreement</div>
            <div class="doc-lang">English · Apple Standard EULA</div>
          </div>
          <span class="chevron">›</span>
        </a>
      </li>
    </ul>
  </div>

  <footer>© 2026 Jonas Polenz · Diemo</footer>
</body>
</html>
